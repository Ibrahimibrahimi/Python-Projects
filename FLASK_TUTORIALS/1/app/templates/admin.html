<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to hidden admin panel</title>
</head>
<body>

    <h1>Found {{l}} users </h1>
        {% for user in users %}
            <div class="profile">
                <h2 class="name"> {{user.username}}</h2>
                <div class="created_at">
                    Created at : <span style="opacity: 0.5;color : gray;"> {{user.created_at}}</span>
                </div>
                <div class="">
                    <p>Bio : </p>
                    <textarea style="padding: 20px 20px ;">
                        {{user.bio}}
                    </textarea>
                </div>
                    <a href="/users/delete/{{user.email}}">Delete this user</a>
            </div>
        {% endfor %}

</body>
</html>
